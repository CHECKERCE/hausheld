services:
  postgres:
    image: postgres:16
    container_name: hausheld-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hausheld
      POSTGRES_PASSWORD: hausheld
      POSTGRES_DB: hausheld
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: